<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Timetable AI</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h2 style="margin-bottom: 1.5rem; text-align: center;">Create Account</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required placeholder="Create a password">
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" required placeholder="Confirm your password">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Register</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a href="/login-page" class="text-primary">Login</a>
            </p>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="../static/js/app.js"></script>
    <script src="../static/js/auth.js"></script>
</body>
</html>
