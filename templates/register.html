<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register | Smart Timetable AI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="auth-container">

    <div class="auth-box">

        <div class="auth-header">

            <i class="fa-solid fa-user-plus fa-3x"></i>

            <h2>

                Create Account

            </h2>

            <p>

                Join Smart Timetable AI

            </p>

        </div>



        <form
            id="registerForm"
            method="POST"
            action="/register">

            <div class="form-group">

                <label>

                    Full Name

                </label>

                <input
                    type="text"
                    id="name"
                    name="name"
                    placeholder="Enter your full name"
                    required>

            </div>



            <div class="form-group">

                <label>

                    Email

                </label>

                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Enter your email"
                    required>

            </div>



            <div class="form-group">

                <label>

                    Password

                </label>

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Create password"
                    required>

            </div>



            <div class="form-group">

                <label>

                    Confirm Password

                </label>

                <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    placeholder="Confirm password"
                    required>

            </div>



            <button
                type="submit"
                class="btn-primary">

                <i class="fa-solid fa-user-check"></i>

                Create Account

            </button>

        </form>



        <div class="auth-footer">

            Already have an account?

            <a href="/login">

                Login

            </a>

        </div>

    </div>

</div>



<div
    id="toastContainer"
    class="toast-container">

</div>



<script src="{{ url_for('static', filename='js/app.js') }}"></script>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

</body>

</html>
